[workspace]
name        = "pychum"
version     = "1.1.0"
description = "Input file generators for computational chemistry"
authors     = [ "Rohit Goswami <rgoswami[at]ieee[dot]org>" ]
channels    = [ "conda-forge" ]
platforms   = [ "linux-64" ]

# Pixi is only needed for conda-gated optional dependencies.
# For standard development, use uv: uv sync --extra test --extra cli

[dependencies]
python = ">=3.12"

[pypi-dependencies]
pychum        = { path = ".", editable = true }
rgpycrumbs    = { path = "../rgpycrumbs", editable = true }
chemparseplot = { path = "../chemparseplot", editable = true }
