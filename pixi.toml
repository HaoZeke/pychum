[workspace]
name = "pychum"
version = "1.1.0"
description = "Input file generators for computational chemistry"
authors = ["Rohit Goswami <rgoswami[at]ieee[dot]org>"]
channels = ["conda-forge"]
platforms = ["linux-64"]

# Pixi is only needed for conda-gated optional dependencies.
# For standard development, use uv: uv sync --extra test

[dependencies]
python = ">=3.12"

[pypi-dependencies]
pychum = { path = ".", editable = true }

[feature.docs.dependencies]
ase = ">=3.27.0,<4"
emacs = ">=30.2,<31"
numpy = ">=2.4.1,<3"
sphinx-favicon = ">=1.0.1,<2"

[feature.docs.pypi-dependencies]
autodoc-pydantic = ">=2.2.0, <3"
shibuya = ">=2025.12.13, <2026"
sphinx = ">=9.0.4, <10"
sphinx-autoapi = ">=3.6.0, <4"
sphinx-click = ">=6.2.0, <7"
sphinx-copybutton = ">=0.5, <1"
myst-nb = ">=1.1, <2"
sphinx-sitemap = ">=2.9.0, <3"
sphinxcontrib-programoutput = ">=0.18, <0.19"
sphobjinv = ">=2.3.1.3, <3"

[feature.test.pypi-dependencies]
pychum = { path = ".", editable = true }
pytest = ">=7.4"
pytest-cov = ">=4.1"

[feature.test.tasks.test]
cmd = "COVERAGE_FILE=.coverage.test python -m pytest tests/ --cov -q; true"

[tasks.cov-clean]
cmd = "find . -maxdepth 1 -name '.coverage*' -delete 2>/dev/null; true"

[tasks.cov]
cmd = "coverage combine .coverage.test && coverage report"
depends-on = ["cov-clean", { task = "test", environment = "test" }]

[environments]
docs = { features = ["docs"] }
test = { features = ["test"] }

[feature.docs.tasks.docbld]
depends-on = ["mkrst", "sphinxbld"]

[feature.docs.tasks.sphinxbld]
cmd = """
sphinx-build docs/source/ docs/build
"""
depends-on = [{ task = "mkrst", environment = "docs" }]

[feature.docs.tasks.mkrst]
cmd = """
emacs --batch --load export.el
"""
cwd = "docs"

[feature.docs.tasks.docdel]
cwd = "docs"
# removes files generated by sphinx and orgmode
cmd = """
rm -rf build
rm -rf source/*.rst
"""
